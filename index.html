<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <title>Sperbtheo - Gerador de IA</title>
</head>

<body>

    <h1>
        CSS Gerador <span>com IA</span>⚡️
    </h1>

    <p>
        Descreva o que você imagina e veja a mágica acontecer
    </p>

    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando"></textarea>

    <button class="botao-gerar">Gerar Código ⚡️</button>

    <div class="container-codigo">

        <div class="box">
            <h2>Código</h2>
            <p class="bloco-codigo"></p>
        </div>

        <div class="box">
            <h2>Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </div>

    </div>

    <script src="scripts.js"></script>

</body>

</html>
